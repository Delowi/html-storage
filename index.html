<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karya Anak Lokal - Tidak Bersaing Hanya Kebutuhan Pribadi</title>
<link rel="shortcut icon" href="https://i.ibb.co/DfGVfrLw/8cd5c852-61c7-425f-bcfd-5d0a8f20cb52.webp">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}
</style>

</head>

<body class="text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto">

    <h1 class="text-4xl font-bold mb-8">
        ANGJAY
    </h1>

    <!-- UPLOAD BOX -->

    <div class="bg-slate-800 p-6 rounded-3xl mb-10">

        <input
            id="token"
            type="password"
            placeholder="GitHub Token"
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none"
        >

        <input
            id="templateName"
            type="text"
            placeholder="Nama Template"
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none"
        >

        <textarea
            id="htmlCode"
            placeholder="Paste HTML di sini..."
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none h-64"
        ></textarea>

        <!-- DROP IMAGE -->

        <label
            for="imageFile"
            class="border-2 border-dashed border-slate-500 rounded-2xl p-10 flex items-center justify-center cursor-pointer mb-4"
        >
            <div class="text-center">

                <p class="text-2xl font-bold mb-2">
                    Upload Thumbnail
                </p>

                <p class="text-slate-400">
                    Klik untuk upload gambar
                </p>

            </div>
        </label>

        <input
            id="imageFile"
            type="file"
            accept="image/*"
            class="hidden"
        >

        <button
            onclick="uploadTemplate()"
            class="bg-emerald-500 hover:bg-emerald-600 px-6 py-4 rounded-2xl font-bold w-full"
        >
            SIMPAN TEMPLATE
        </button>

    </div>

    <!-- CARD -->

    <div
        id="cards"
        class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"
    ></div>

</div>

<script>

const username = "Delowi";
const repo = "html-storage";

window.onload = () => {

    const savedToken =
        localStorage.getItem('github_token');

    if(savedToken){
        document.getElementById('token').value =
            savedToken;
    }

    loadTemplates();
};

function saveToken(){

    const token =
        document.getElementById('token').value;

    localStorage.setItem(
        'github_token',
        token
    );
}

async function githubRequest(
    path,
    method='GET',
    body=null
){

    const token =
        document.getElementById('token').value;

    const response = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`,
        {
            method,

            headers:{
                Authorization:`token ${token}`,
                Accept:'application/vnd.github+json'
            },

            body: body
                ? JSON.stringify(body)
                : null
        }
    );

    return response.json();
}

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload=()=>resolve(reader.result);

        reader.onerror=error=>reject(error);

    });
}

async function uploadTemplate(){

    saveToken();

    const name =
        document.getElementById('templateName').value;

    const html =
        document.getElementById('htmlCode').value;

    const image =
        document.getElementById('imageFile').files[0];

    if(!name || !html || !image){

        alert('Lengkapi semua data');

        return;
    }

    // HTML

    const encodedHtml =
        btoa(unescape(encodeURIComponent(html)));

    const check = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${name}.html`
    );

    let sha = null;

    if(check.status === 200){
        const data = await check.json();
        sha = data.sha;
    }

    const result = await githubRequest(
    `${name}.html`,
    'PUT',
    {
        message:`upload ${name}.html`,
        content:encodedHtml,
        sha: sha ? sha : undefined
        }
    );

    console.log("upload result:", result);

    // IMAGE

    const image64 =
        await fileToBase64(image);

    const imageContent =
        image64.split(',')[1];

    const imageExt =
        image.name.split('.').pop();

    await githubRequest(
        `thumb-${name}.${imageExt}`,
        'PUT',
        {
            message:`upload thumb ${name}`,
            content:imageContent
        }
    );

    alert('UDAH DI SIMPAN YA PANT3K');

    loadTemplates();
}

async function loadTemplates(){

    const cards = document.getElementById('cards');
    cards.innerHTML = '';

    try {

        // ambil file list dari raw GitHub (PUBLIC SAFE)
        const res = await fetch(
            "https://api.github.com/repos/Delowi/html-storage/contents"
        );

        const files = await res.json();

        const htmlFiles = files.filter(f =>
            f.name.endsWith('.html') &&
            f.name !== 'index.html'
        );

        const imgFiles = files.filter(f =>
            f.name.startsWith('thumb-')
        );

        htmlFiles.forEach(file => {

            const name = file.name.replace('.html','');

            const img = imgFiles.find(i =>
                i.name.includes(name)
            );

            const imgUrl = img
                ? `https://raw.githubusercontent.com/Delowi/html-storage/main/${img.name}`
                : '';

            const liveUrl =
                `https://delowi.github.io/html-storage/${file.name}`;

            cards.innerHTML += `
            <div class="bg-slate-800 rounded-3xl overflow-hidden">

                ${imgUrl ? `
                    <img src="${imgUrl}"
                    class="w-full h-52 object-cover">
                ` : ''}

                <div class="p-5">

                    <h2 class="text-2xl font-bold mb-5">
                        ${name}
                    </h2>

                    <div class="flex flex-wrap gap-2">

                        <button onclick="window.open('${liveUrl}')"
                        class="bg-blue-500 px-4 py-2 rounded-xl">
                            OPEN
                        </button>

                        <button onclick="copyHtml('${file.download_url}')"
                        class="bg-yellow-500 text-black px-4 py-2 rounded-xl">
                            COPY
                        </button>

                        <button onclick="editTemplate('${file.name}')"
                            class="bg-green-500 px-4 py-2 rounded-xl">
                            EDIT
                        </button>

                        <button onclick="deleteTemplate('${file.name}','${img ? img.name : ''}')"
                        class="bg-red-500 px-4 py-2 rounded-xl">
                            DELETE
                        </button>

                    </div>

                </div>

            </div>`;
        });

    } catch(err){
        console.log("ERROR LOAD:", err);
    }
}

async function copyHtml(url){

    const response =
        await fetch(url);

    const text =
        await response.text();

    navigator.clipboard.writeText(text);

    alert('COPY TEROS COPY TERUS KAMPANG');
}

//====================
// EDIT TEMPLATE
//====================

let currentEditFile = "";

async function editTemplate(fileName){

    currentEditFile = fileName;

    const data = await githubRequest(fileName);

    if(!data.content){

        alert("Token salah atau file tidak ditemukan");

        console.log(data);

        return;

    }

    const html = decodeURIComponent(

        escape(

            atob(data.content.replace(/\n/g,''))

        )

    );

    document.getElementById("editHtml").value = html;
    document.getElementById("previewFrame").srcdoc = html;
    document.getElementById("editModal").style.display = "block";

}

function closeEdit(){

    document.getElementById("editModal").style.display = "none";

}

async function saveEdit(){

    const html =
    document.getElementById("editHtml").value;

    const file =
    await githubRequest(currentEditFile);

    const encoded =
    btoa(unescape(encodeURIComponent(html)));

    const result =
    await githubRequest(

        currentEditFile,

        "PUT",

        {

            message:`edit ${currentEditFile}`,

            content:encoded,

            sha:file.sha

        }

    );

    console.log(result);

    if(result.content){

        alert("Berhasil disimpan");

        closeEdit();

    }else{

        alert("Gagal menyimpan");

    }

}

async function deleteTemplate(
    htmlName,
    imageName
){

    if(!confirm('JANGAN KAU HAPUS!'))
        return;

    // DELETE HTML

    const htmlFile =
        await githubRequest(htmlName);

    await githubRequest(
        htmlName,
        'DELETE',
        {
            message:`delete ${htmlName}`,
            sha:htmlFile.sha
        }
    );

    // DELETE IMAGE

    if(imageName){

        const imageFile =
            await githubRequest(imageName);

        await githubRequest(
            imageName,
            'DELETE',
            {
                message:`delete ${imageName}`,
                sha:imageFile.sha
            }
        );
    }

    alert('PANTEK KENAPA KAU HAPUS?');

    loadTemplates();
}
    document.addEventListener("input",(e)=>{

        if(e.target.id!="editHtml") return;

        document.getElementById("previewFrame").srcdoc =
            e.target.value;

});

</script>
<div id="editModal" 
style="
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:999;
">

<div style="
width:90%;
height:90%;
background:#1e293b;
margin:auto;
margin-top:2%;
border-radius:20px;
padding:20px;
display:flex;
flex-direction:column;
">

    <h2 class="text-3xl font-bold mb-4">
    PREVIEW KONTEN
    </h2>
    <div class="flex gap-4 flex-1">
    <textarea
    id="editHtml"
    class="flex-1 bg-slate-900 rounded-xl p-5 outline-none"
    ></textarea>
    <iframe
    id="previewFrame"
    class="flex-1 bg-white rounded-xl"
    ></iframe>
    </div>
    <div class="mt-4 flex gap-3">
    <button
    onclick="saveEdit()"
    class="bg-green-500 px-6 py-3 rounded-xl">
    SIMPAN
    </button>
    <button
    onclick="closeEdit()"
    class="bg-red-500 px-6 py-3 rounded-xl">
    BATAL
    </button>
   </div>
  </div>
 </div>
</body>
</html>
