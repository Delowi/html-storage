<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Storage</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0f172a;}
</style>
</head>

<body class="text-white p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-4xl font-bold mb-8">HTML STORAGE</h1>

<!-- ADMIN PANEL -->
<div class="bg-slate-800 p-6 rounded-2xl mb-10">

<input id="token" type="password"
placeholder="GitHub Token (admin)"
class="w-full p-4 rounded-xl bg-slate-700 mb-3">

<input id="name" type="text"
placeholder="Nama Template"
class="w-full p-4 rounded-xl bg-slate-700 mb-3">

<textarea id="html"
placeholder="Paste HTML di sini..."
class="w-full h-60 p-4 rounded-xl bg-slate-700 mb-3"></textarea>

<input id="image" type="file" accept="image/*"
class="w-full p-3 bg-slate-700 rounded-xl mb-3">

<button onclick="upload()"
class="bg-emerald-500 w-full py-3 rounded-xl font-bold">
UPLOAD TEMPLATE
</button>

</div>

<!-- CARD -->
<div id="cards" class="grid md:grid-cols-3 gap-6"></div>

</div>

<script>

const username = "Delowi";
const repo = "html-storage";

let htmlList = [];
let imgList = [];

/* =========================
   LOAD (AUTO SCAN GITHUB)
========================= */

async function loadTemplates(){

    const cards = document.getElementById("cards");
    cards.innerHTML = "";

    try {

        // ambil SEMUA file root repo dulu (fallback aman)
        const res = await fetch(
            "https://api.github.com/repos/Delowi/html-storage/contents"
        );

        const files = await res.json();

        const htmlFiles = files.filter(f =>
            f.name.endsWith(".html") &&
            f.name !== "index.html"
        );

        htmlFiles.forEach(file => {

            const name = file.name.replace(".html","");

            const liveUrl =
            `https://delowi.github.io/html-storage/${file.name}`;

            cards.innerHTML += `
            <div class="bg-slate-800 p-5 rounded-2xl">

                <h2 class="text-xl font-bold mb-3">${name}</h2>

                <button onclick="window.open('${liveUrl}')"
                class="bg-blue-500 px-3 py-2 rounded-xl">
                    OPEN
                </button>

                <button onclick="copyHtml('${file.download_url}')"
                class="bg-yellow-500 text-black px-3 py-2 rounded-xl">
                    COPY
                </button>

            </div>`;
        });

    } catch(err){
        console.log(err);
    }
}

/* =========================
   UPLOAD TEMPLATE (ADMIN)
========================= */

async function upload(){

    const token = document.getElementById("token").value;
    const name = document.getElementById("name").value;
    const html = document.getElementById("html").value;
    const image = document.getElementById("image").files[0];

    if(!name || !html || !image){
        alert("Lengkapi data");
        return;
    }

    if(token){
        localStorage.setItem("token",token);
    }

    const encodedHtml = btoa(unescape(encodeURIComponent(html)));

    // upload html
    await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/projects/${name}.html`,
        {
            method:"PUT",
            headers:{
                Authorization:`token ${token}`,
                Accept:"application/vnd.github+json"
            },
            body: JSON.stringify({
                message:"upload html",
                content: encodedHtml
            })
        }
    );

    // upload image
    const base64 = await toBase64(image);

    await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/thumbs/thumb-${name}.${image.name.split('.').pop()}`,
        {
            method:"PUT",
            headers:{
                Authorization:`token ${token}`,
                Accept:"application/vnd.github+json"
            },
            body: JSON.stringify({
                message:"upload image",
                content: base64.split(",")[1]
            })
        }
    );

    alert("Upload sukses");
    loadTemplates();
}

/* =========================
   COPY HTML
========================= */

async function copyHtml(url){

    const res = await fetch(url);
    const text = await res.text();

    navigator.clipboard.writeText(text);

    alert("Copied!");
}

/* =========================
   DELETE (ADMIN)
========================= */

async function deleteFile(path){

    const token = document.getElementById("token").value;

    if(!token){
        alert("Masukkan token admin");
        return;
    }

    if(!confirm("Hapus file ini?")) return;

    const res = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`
    );

    const data = await res.json();

    await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`,
        {
            method:"DELETE",
            headers:{
                Authorization:`token ${token}`,
                Accept:"application/vnd.github+json"
            },
            body: JSON.stringify({
                message:"delete file",
                sha:data.sha
            })
        }
    );

    alert("Terhapus");
    loadTemplates();
}

/* =========================
   UTIL BASE64
========================= */

function toBase64(file){
    return new Promise((res,rej)=>{
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload=()=>res(r.result);
        r.onerror=e=>rej(e);
    });
}

/* =========================
   INIT
========================= */

window.onload = () => {

    const saved = localStorage.getItem("token");
    if(saved) document.getElementById("token").value = saved;

    loadTemplates();
};

</script>

</body>
</html>
