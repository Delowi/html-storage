<script>

const username = "Delowi";
const repo = "html-storage";

window.onload = () => {

    const savedToken =
        localStorage.getItem('github_token');

    if(savedToken){
        document.getElementById('token').value =
            savedToken;
    }

    loadTemplates();
};

function saveToken(){

    const token =
        document.getElementById('token').value;

    localStorage.setItem(
        'github_token',
        token
    );
}

async function githubRequest(
    path,
    method='GET',
    body=null
){

    const token =
        document.getElementById('token').value;

    const response = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`,
        {
            method,

            headers:{
                Authorization:`token ${token}`,
                Accept:'application/vnd.github+json'
            },

            body: body
                ? JSON.stringify(body)
                : null
        }
    );

    return response.json();
}

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload=()=>resolve(reader.result);

        reader.onerror=error=>reject(error);

    });
}

async function uploadTemplate(){

    saveToken();
    showLoading("📤 Uploading Template...");

    const name =
        document.getElementById('templateName').value;

    const html =
        document.getElementById('htmlCode').value;

    const amp =
        document.getElementById('ampCode').value;

    const image =
        document.getElementById('imageFile').files[0];

    if(!name || !html || !amp || !image){

        alert('Lengkapi semua data');

        return;
    }

    // HTML

    const encodedHtml =
        btoa(unescape(encodeURIComponent(html)));

    const check = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${name}.html`
    );

    let sha = null;

    if(check.status === 200){
        const data = await check.json();
        sha = data.sha;
    }

    const result = await githubRequest(
    `${name}.html`,
    'PUT',
    {
        message:`upload ${name}.html`,
        content:encodedHtml,
        sha: sha ? sha : undefined
        }
    );

    // =====================
    // UPLOAD AMP HTML
    // =====================

    const encodedAmp =
        btoa(unescape(encodeURIComponent(amp)));

    const checkAmp = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${name}-amp.html`
    );

    let ampSha = null;

    if(checkAmp.status === 200){

        const ampData = await checkAmp.json();

        ampSha = ampData.sha;

    }

    const ampResult = await githubRequest(
        `${name}-amp.html`,
        'PUT',
        {
            message:`upload ${name}-amp.html`,
            content:encodedAmp,
            sha: ampSha ? ampSha : undefined
        }
    );

    console.log("AMP upload:", ampResult);

    console.log("upload result:", result);

    // IMAGE

    const image64 =
        await fileToBase64(image);

    const imageContent =
        image64.split(',')[1];

    const imageExt =
        image.name.split('.').pop();

    await githubRequest(
        `thumb-${name}.${imageExt}`,
        'PUT',
        {
            message:`upload thumb ${name}`,
            content:imageContent
        }
    );

    showToast("UDAH DI SIMPAN YA PANT3K");
    hideLoading();
    loadTemplates();
}

async function loadTemplates(){

    const cards = document.getElementById('cards');
    cards.innerHTML = '';

    try {

        // ambil file list dari raw GitHub (PUBLIC SAFE)
        const res = await fetch(
            "https://api.github.com/repos/Delowi/html-storage/contents"
        );

        const files = await res.json();

        const htmlFiles = files.filter(f =>
            f.name.endsWith('.html') &&
            !f.name.endsWith('-amp.html') &&
            f.name !== 'index.html'
        );

        const imgFiles = files.filter(f =>
            f.name.startsWith('thumb-')
        );

        const ampFiles = files.filter(f =>
            f.name.endsWith('-amp.html')
        );

        htmlFiles.forEach((file,index) => {

            const name = file.name.replace('.html','');

            const amp = ampFiles.find(a =>
                a.name === `${name}-amp.html`
            );

            const img = imgFiles.find(i =>
                i.name.includes(name)
            );

            const imgUrl = img
                ? `https://raw.githubusercontent.com/Delowi/html-storage/main/${img.name}`
                : '';

            const liveUrl =
                `https://delowi.github.io/html-storage/${file.name}`;

            const ampUrl = amp
                ? `https://delowi.github.io/html-storage/${amp.name}`: '';

            cards.innerHTML += `
            <div class="card bg-slate-800 rounded-3xl overflow-hidden" style="animation-delay:${index*0.08}s">

                ${imgUrl ? `
                    <img src="${imgUrl}"
                    class="thumb w-full h-52 object-cover">
                ` : ''}

                <div class="p-5">

                    <h2
                    class="text-2xl font-bold mb-5 truncate"
                    title="${name}">
                        ${name}
                    </h2>

                    <div class="flex flex-wrap gap-2">
                        <button
                            onclick="window.open('${liveUrl}')"
                            class="bg-blue-500 px-4 py-2 rounded-xl">
                            🌐 LANDING
                        </button>

                        ${
                            amp
                            ?
                            `
                            <button
                                onclick="window.open('${ampUrl}')"
                                class="bg-green-500 px-4 py-2 rounded-xl"
                            >
                                📱 AMP
                            </button>
                            `
                            :
                            `
                            <button
                                class="bg-gray-600 px-4 py-2 rounded-xl cursor-not-allowed"
                                disabled
                            >
                                🚫 NO AMP
                            </button>
                            `
                        }

                        <button
                            onclick="copyHtml('${file.download_url}')"
                            class="bg-yellow-500 text-black px-4 py-2 rounded-xl"
                        >
                            📋 COPY
                        </button>

                        <button
                            onclick="editTemplate('${file.name}','${amp ? amp.name : ''}')"
                            class="bg-purple-500 px-4 py-2 rounded-xl"
                        >
                            ✏ EDIT
                        </button>

                        <button
                            onclick="deleteTemplate('${file.name}','${img ? img.name : ''}')"
                            class="bg-red-500 px-4 py-2 rounded-xl"
                        >
                            🗑 DELETE
                        </button>

                    </div>

                </div>

            </div>`;
        });

    } catch(err){
        console.log("ERROR LOAD:", err);
    }
}

async function copyHtml(url){

    const response =
        await fetch(url);

    const text =
        await response.text();

    navigator.clipboard.writeText(text);

    showToast("COPY TEROS COPY TERUS KAMPANG","#3b82f6");
}

let currentEditFile = "";
let currentAmpFile = "";

async function editTemplate(fileName, ampFile){

    currentEditFile = fileName;
    currentAmpFile = ampFile;

    const data = await githubRequest(fileName);

    if(!data.content){

        alert("Token salah atau file tidak ditemukan");

        console.log(data);

        return;

    }

    const html = decodeURIComponent(

        escape(

            atob(data.content.replace(/\n/g,''))

        )

    );

    document.getElementById("editHtml").value = html;

    let ampHtml = "";

    if(ampFile){

        const ampData = await githubRequest(ampFile);

        if(ampData.content){

            ampHtml = decodeURIComponent(

                escape(

                    atob(ampData.content.replace(/\n/g,''))

                )

            );

        }

    }

    document.getElementById("editAmp").value = ampHtml;

    document.getElementById("previewFrame").srcdoc = html;

    document.getElementById("editModal").style.display = "block";

}

function closeEdit(){

    document.getElementById("editModal").style.display = "none";

}

showLoading("💾 Menyimpan Perubahan...");
async function saveEdit(){

    const html =
    document.getElementById("editHtml").value;

    const amp =
    document.getElementById("editAmp").value;

    const file =
    await githubRequest(currentEditFile);

    console.log("Isi textarea AMP:", amp);

    const encoded =
    btoa(unescape(encodeURIComponent(html)));

    console.log("currentEditFile:", currentEditFile);
    console.log("currentAmpFile:", currentAmpFile);
    console.log("AMP isi:", amp);

    const result = await githubRequest(
        currentEditFile,
        "PUT",
        {
            message:`edit ${currentEditFile}`,
            content:encoded,
            sha:file.sha
        }

    );

    console.log(result);

    if(amp.trim() !== ""){
        const encodedAmp =
        btoa(unescape(encodeURIComponent(amp)));
        let ampSha = undefined;
        if(currentAmpFile){
            const ampFile =
            await githubRequest(currentAmpFile);
            if(ampFile.sha){
                ampSha = ampFile.sha;
            }

        }else{
            currentAmpFile =
            currentEditFile.replace(".html","-amp.html");
        }

        const ampResult = await githubRequest(
            currentAmpFile,
            "PUT",
            {
                message:`edit ${currentAmpFile}`,
                content:encodedAmp,
                sha:ampSha
            }
        );
        console.log("AMP RESULT:", ampResult);
    }

    if(result.content){

        showToast("💾 Perubahan berhasil disimpan");
        hideLoading();
        closeEdit();

    }else{

        showToast("❌ Gagal menyimpan","#ef4444");

    }

}

async function deleteTemplate(
    htmlName,
    imageName
){

    if(!confirm('JANGAN KAU HAPUS!'))
        return;
    showLoading("🗑 Menghapus Template...");

    // DELETE HTML

    const htmlFile =
        await githubRequest(htmlName);

    await githubRequest(
        htmlName,
        'DELETE',
        {
            message:`delete ${htmlName}`,
            sha:htmlFile.sha
        }
    );

    // DELETE IMAGE

    if(imageName){

        const imageFile =
            await githubRequest(imageName);

        await githubRequest(
            imageName,
            'DELETE',
            {
                message:`delete ${imageName}`,
                sha:imageFile.sha
            }
        );
    }

    showToast("PANTEK KENAPA KAU HAPUS?","#ef4444");
    hideLoading();
    loadTemplates();
}
    document.addEventListener("input",(e)=>{

        if(e.target.id!="editHtml") return;

        document.getElementById("previewFrame").srcdoc =
            e.target.value;

});

//=========================
// TOAST
//=========================

function showToast(message,color="#22c55e"){

    const toast=document.createElement("div");

    toast.innerHTML=message;

    toast.style.cssText=`

    position:fixed;

    top:30px;

    right:-400px;

    background:${color};

    color:white;

    padding:15px 25px;

    border-radius:14px;

    font-weight:bold;

    z-index:99999;

    transition:.35s ease;

    box-shadow:0 15px 35px rgba(0,0,0,.35);

    `;

    document.body.appendChild(toast);

    setTimeout(()=>{

        toast.style.right="30px";

    },50);

    setTimeout(()=>{

        toast.style.right="-400px";

        setTimeout(()=>{

            toast.remove();

        },400);

    },2500);

}

function showLoading(text="Loading..."){

document.getElementById("loadingText").innerHTML=text;

document.getElementById("loading").style.display="flex";

}

function hideLoading(){

document.getElementById("loading").style.display="none";

}

function closeEditor(){

    document
    .getElementById("editorModal")
    .classList.add("hidden");

}

function updatePreview(){

    document.getElementById("previewFrame").srcdoc =
    document.getElementById("editHtml").value;

}
