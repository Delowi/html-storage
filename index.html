<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Storage</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#0f172a;
}
</style>

</head>

<body class="text-white min-h-screen p-6">

<div class="max-w-7xl mx-auto">

    <h1 class="text-4xl font-bold mb-8">
        HTML STORAGE
    </h1>

    <!-- UPLOAD BOX -->

    <div class="bg-slate-800 p-6 rounded-3xl mb-10">

        <input
            id="token"
            type="password"
            placeholder="GitHub Token"
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none"
        >

        <input
            id="templateName"
            type="text"
            placeholder="Nama Template"
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none"
        >

        <textarea
            id="htmlCode"
            placeholder="Paste HTML di sini..."
            class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none h-64"
        ></textarea>

        <!-- DROP IMAGE -->

        <label
            for="imageFile"
            class="border-2 border-dashed border-slate-500 rounded-2xl p-10 flex items-center justify-center cursor-pointer mb-4"
        >
            <div class="text-center">

                <p class="text-2xl font-bold mb-2">
                    Upload Thumbnail
                </p>

                <p class="text-slate-400">
                    Klik untuk upload gambar
                </p>

            </div>
        </label>

        <input
            id="imageFile"
            type="file"
            accept="image/*"
            class="hidden"
        >

        <button
            onclick="uploadTemplate()"
            class="bg-emerald-500 hover:bg-emerald-600 px-6 py-4 rounded-2xl font-bold w-full"
        >
            SIMPAN TEMPLATE
        </button>

    </div>

    <!-- CARD -->

    <div
        id="cards"
        class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"
    ></div>

</div>

<script>

const username = "Delowi";
const repo = "html-storage";

window.onload = () => {

    const savedToken =
        localStorage.getItem('github_token');

    if(savedToken){
        document.getElementById('token').value =
            savedToken;
    }

    loadTemplates();
};

function saveToken(){

    const token =
        document.getElementById('token').value;

    localStorage.setItem(
        'github_token',
        token
    );
}

async function githubRequest(
    path,
    method='GET',
    body=null
){

    const token =
        document.getElementById('token').value;

    const response = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`,
        {
            method,

            headers:{
                Authorization:`token ${token}`,
                Accept:'application/vnd.github+json'
            },

            body: body
                ? JSON.stringify(body)
                : null
        }
    );

    return response.json();
}

function fileToBase64(file){

    return new Promise((resolve,reject)=>{

        const reader = new FileReader();

        reader.readAsDataURL(file);

        reader.onload=()=>resolve(reader.result);

        reader.onerror=error=>reject(error);

    });
}

async function uploadTemplate(){

    saveToken();

    const name =
        document.getElementById('templateName').value;

    const html =
        document.getElementById('htmlCode').value;

    const image =
        document.getElementById('imageFile').files[0];

    if(!name || !html || !image){

        alert('Lengkapi semua data');

        return;
    }

    // HTML

    const encodedHtml =
        btoa(unescape(encodeURIComponent(html)));

    await githubRequest(
        `${name}.html`,
        'PUT',
        {
            message:`upload ${name}.html`,
            content:encodedHtml
        }
    );

    // IMAGE

    const image64 =
        await fileToBase64(image);

    const imageContent =
        image64.split(',')[1];

    const imageExt =
        image.name.split('.').pop();

    await githubRequest(
        `thumb-${name}.${imageExt}`,
        'PUT',
        {
            message:`upload thumb ${name}`,
            content:imageContent
        }
    );

    alert('Template berhasil disimpan');

    loadTemplates();
}

async function loadTemplates(){

    const cards = document.getElementById('cards');
    cards.innerHTML = '';

    try {

        // ambil semua file repo
        const response = await githubRequest('');

        const htmlFiles = response.filter(file =>
            file.name.endsWith('.html') &&
            file.name !== 'index.html'
        );

        htmlFiles.forEach(file => {

            const name = file.name.replace('.html','');

            // cari thumbnail (lebih fleksibel)
            const image = response.find(img =>
                img.name.includes(name) &&
                img.name.startsWith('thumb-')
            );

            // URL LIVE HARUS PAKAI /projects/
            const liveUrl =
                `https://${username}.github.io/${repo}/projects/${file.name}`;

            cards.innerHTML += `
            <div class="bg-slate-800 rounded-3xl overflow-hidden">

                ${image ? `
                    <img src="${image.download_url}"
                    class="w-full h-52 object-cover">
                ` : ''}

                <div class="p-5">

                    <h2 class="text-2xl font-bold mb-5">
                        ${name}
                    </h2>

                    <div class="flex flex-wrap gap-2">

                        <button
                            onclick="window.open('${liveUrl}')"
                            class="bg-blue-500 px-4 py-2 rounded-xl"
                        >
                            OPEN
                        </button>

                        <button
                            onclick="copyHtml('${file.download_url}')"
                            class="bg-yellow-500 text-black px-4 py-2 rounded-xl"
                        >
                            COPY
                        </button>

                        <button
                            onclick="deleteTemplate('${file.name}','${image ? image.name : ''}')"
                            class="bg-red-500 px-4 py-2 rounded-xl"
                        >
                            DELETE
                        </button>

                    </div>

                </div>

            </div>
            `;
        });

    } catch(err){
        console.log('LOAD ERROR:', err);
    }
}

async function copyHtml(url){

    const response =
        await fetch(url);

    const text =
        await response.text();

    navigator.clipboard.writeText(text);

    alert('HTML berhasil dicopy');
}

async function deleteTemplate(
    htmlName,
    imageName
){

    if(!confirm('Hapus template?'))
        return;

    // DELETE HTML

    const htmlFile =
        await githubRequest(htmlName);

    await githubRequest(
        htmlName,
        'DELETE',
        {
            message:`delete ${htmlName}`,
            sha:htmlFile.sha
        }
    );

    // DELETE IMAGE

    if(imageName){

        const imageFile =
            await githubRequest(imageName);

        await githubRequest(
            imageName,
            'DELETE',
            {
                message:`delete ${imageName}`,
                sha:imageFile.sha
            }
        );
    }

    alert('Template berhasil dihapus');

    loadTemplates();
}

</script>

</body>
</html>
