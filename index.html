<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Storage</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-8">

<h1 class="text-4xl font-bold mb-8">
HTML Storage
</h1>

<div class="bg-slate-800 p-6 rounded-2xl mb-10">

<input
    id="token"
    type="password"
    placeholder="GitHub Token"
    class="w-full p-4 rounded-xl bg-slate-700 mb-4"
>

<input
    id="htmlFile"
    type="file"
    accept=".html"
    class="w-full p-4 rounded-xl bg-slate-700 mb-4"
>

<button
    onclick="uploadHtml()"
    class="bg-emerald-500 px-6 py-3 rounded-xl font-bold"
>
UPLOAD HTML
</button>

</div>

<div
    id="cards"
    class="grid md:grid-cols-3 gap-6"
></div>

<script>

const username = "Delowi";
const repo = "html-storage";

let files = [];

window.onload = loadFiles;

async function githubRequest(path, method='GET', body=null) {

    const token = document.getElementById('token').value;

    const response = await fetch(
        `https://api.github.com/repos/${username}/${repo}/contents/${path}`,
        {
            method,

            headers: {
                Authorization: `token ${token}`,
                Accept: 'application/vnd.github+json'
            },

            body: body ? JSON.stringify(body) : null
        }
    );

    return response.json();
}

async function uploadHtml() {

    const file =
        document.getElementById('htmlFile').files[0];

    if(!file) {
        alert('Pilih file html');
        return;
    }

    const content = await file.text();

    const encoded =
        btoa(unescape(encodeURIComponent(content)));

    const response = await githubRequest(
        file.name,
        'PUT',
        {
            message: `upload ${file.name}`,
            content: encoded
        }
    );

    if(response.content) {

        alert('Upload berhasil');

        loadFiles();
    }
}

async function loadFiles() {

    const cards =
        document.getElementById('cards');

    cards.innerHTML = '';

    const token =
        document.getElementById('token').value;

    if(!token) return;

    const response = await githubRequest('');

    files = response.filter(file =>
        file.name.endsWith('.html') &&
        file.name !== 'index.html'
    );

    files.forEach(file => {

        const liveUrl =
            `https://${username}.github.io/${repo}/${file.name}`;

        cards.innerHTML += `

        <div class="bg-slate-800 p-5 rounded-2xl">

            <h2 class="text-xl font-bold mb-5">
                ${file.name}
            </h2>

            <div class="flex gap-2 flex-wrap">

                <button
                    onclick="window.open('${liveUrl}')"
                    class="bg-blue-500 px-4 py-2 rounded-xl"
                >
                    OPEN
                </button>

                <button
                    onclick="copyHtml('${file.download_url}')"
                    class="bg-yellow-500 text-black px-4 py-2 rounded-xl"
                >
                    COPY
                </button>

                <button
                    onclick="deleteHtml('${file.name}')"
                    class="bg-red-500 px-4 py-2 rounded-xl"
                >
                    DELETE
                </button>

            </div>

        </div>

        `;
    });
}

async function copyHtml(url) {

    const response = await fetch(url);

    const text = await response.text();

    navigator.clipboard.writeText(text);

    alert('HTML berhasil dicopy');
}

async function deleteHtml(name) {

    if(!confirm(`Hapus ${name}?`)) return;

    const file = await githubRequest(name);

    await githubRequest(
        name,
        'DELETE',
        {
            message: `delete ${name}`,
            sha: file.sha
        }
    );

    alert('HTML berhasil dihapus');

    loadFiles();
}

</script>

</body>
</html>
